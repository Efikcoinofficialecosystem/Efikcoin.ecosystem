<!-- Connection Panel -->
<div class="glass-card p-5 flex flex-col md:flex-row justify-between items-center gap-4">
    <div class="flex items-center gap-3">
        <div id="connectionIndicator" class="w-3 h-3 rounded-full bg-red-500"></div>
        <span id="connectionStatus" class="font-medium text-gray-300">Not connected</span>
        <span id="networkStatus" class="text-sm text-gray-500"></span>
    </div>
    <div class="flex gap-3">
        <button id="connectBtn" class="btn bg-amber-500 hover:bg-amber-600 text-black px-6 py-2.5 rounded-full text-sm font-bold shadow-lg">
            <i class="fas fa-wallet mr-2"></i>Connect Wallet
        </button>
        <button id="switchNetworkBtn" class="btn bg-gray-700 hover:bg-gray-600 text-white px-5 py-2.5 rounded-full text-sm shadow-lg">
            <i class="fas fa-exchange-alt mr-2"></i>Switch to BSC
        </button>
    </div>
</div>
