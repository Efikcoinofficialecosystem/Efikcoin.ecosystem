<!DOCTYPE html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efikcoin Official Ecosystem (EOE)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        body { background: #0a0a0a; color: #fff; }
        .glass-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,215,0,0.2); }
    </style>
</head>
<body class="p-6 flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold bg-gradient-to-r from-amber-400 to-orange-500 bg-clip-text text-transparent">
                Efikcoin Official Ecosystem
            </h1>
            <p class="text-gray-400 mt-2">Symbol: <span class="font-mono text-amber-400">EOE</span></p>
            <p class="text-xs text-gray-500 break-all mt-1">0xe5f245634af5117ae1cb93b579f911fce6ba8b91</p>
        </div>

        <!-- Connect Wallet Button -->
        <div class="flex justify-center mb-6">
            <button id="connectBtn" class="bg-amber-500 hover:bg-amber-600 text-black font-bold py-3 px-8 rounded-full transition transform hover:scale-105">
                Connect Wallet
            </button>
        </div>

        <!-- Wallet Info (hidden until connected) -->
        <div id="walletInfo" class="glass-card rounded-2xl p-6 mb-6 hidden">
            <div class="grid gap-4">
                <div>
                    <p class="text-gray-400 text-sm">Connected Address</p>
                    <p id="address" class="font-mono break-all text-sm"></p>
                </div>
                <div>
                    <p class="text-gray-400 text-sm">EOE Balance</p>
                    <p id="balance" class="text-2xl font-bold text-amber-400">0</p>
                </div>
                <div>
                    <p class="text-gray-400 text-sm">Total Supply</p>
                    <p id="totalSupply" class="text-xl">Loading...</p>
                </div>
            </div>
        </div>

        <!-- Error Display Area -->
        <div id="errorMsg" class="mt-4 p-3 bg-red-900/50 border border-red-700 text-red-300 rounded-lg hidden"></div>

        <!-- Footer -->
        <div class="text-center text-gray-500 text-sm mt-8">
            Built for humanity. Live on BSC Mainnet.
        </div>
    </div>

    <script>

        // ================ UI Elements ================
        const connectBtn = document.getElementById('connectBtn');
        const walletInfo = document.getElementById('walletInfo');
        const addressSpan = document.getElementById('address');
        const balanceSpan = document.getElementById('balance');
        const totalSupplySpan = document.getElementById('totalSupply');
        const errorDiv = document.getElementById('errorMsg');

        function showError(message) {
            errorDiv.innerText = message;
            errorDiv.classList.remove('hidden');
        }

        function hideError() {
            errorDiv.classList.add('hidden');
        }

        // ================ Network Switching ================
        async function switchToBSC() {
            try {
                await window.ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: '0x38' }] // BSC mainnet
                });
            } catch (switchError) {
                if (switchError.code === 4902) {
                    await window.ethereum.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: '0x38',
                            chainName: 'BNB Smart Chain',
                            nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
                            rpcUrls: ['https://bsc-dataseed.binance.org/'],
                            blockExplorerUrls: ['https://bscscan.com/']
                        }]
                    });
                } else {
                    throw switchError;
                }
            }
        }

        // ================ Connect and Load Data ================
        connectBtn.addEventListener('click', async () => {
            hideError();

            // Check MetaMask
            if (typeof window.ethereum === 'undefined') {
                showError("MetaMask is not installed. Please install it from https://metamask.io");
                return;
            }

            try {
                // Request accounts
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                if (accounts.length === 0) {
                    showError("No accounts found. Please unlock MetaMask and try again.");
                    return;
                }

                // Switch to BSC
                await switchToBSC();

                // Initialize ethers provider and contract
                const provider = new ethers.BrowserProvider(window.ethereum);
                const signer = await provider.getSigner();
                const userAddress = await signer.getAddress();
                addressSpan.innerText = userAddress;

                const contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, provider);

                // Fetch data
                const balance = await contract.balanceOf(userAddress);
                const decimals = await contract.decimals();
                const totalSupply = await contract.totalSupply();

                // Format and display
                balanceSpan.innerText = ethers.formatUnits(balance, decimals) + ' EOE';
                totalSupplySpan.innerText = ethers.formatUnits(totalSupply, decimals) + ' EOE';
                walletInfo.classList.remove('hidden');
            } catch (error) {
                console.error(error);
                showError(error.message || "An unknown error occurred. See console for details.");
            }
        });

        // Optional: refresh data when account changes
        if (window.ethereum) {
            window.ethereum.on('accountsChanged', (accounts) => {
                if (accounts.length > 0) {
                    // Could refresh, but for simplicity reload the page
                    window.location.reload();
                } else {
                    walletInfo.classList.add('hidden');
                }
            });
        }
    </script>
</body>
</html>
