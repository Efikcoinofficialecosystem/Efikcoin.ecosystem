<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efikcoin Official Ecosystem (EOE)</title>
    <!-- Tailwind CSS for styling (no build) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Ethers.js for blockchain interaction -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        body { background: #0a0a0a; color: #fff; }
        .glass-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,215,0,0.2); }
    </style>
</head>
<body class="p-6">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold bg-gradient-to-r from-amber-400 to-orange-500 bg-clip-text text-transparent">
                Efikcoin Official Ecosystem
            </h1>
            <p class="text-gray-400 mt-2">Symbol: <span class="font-mono text-amber-400">EOE</span></p>
            <p class="text-sm text-gray-500">Contract: 0xe5f245634af5117ae1cb93b579f911fce6ba8b91</p>
        </div>

        <!-- Connect Wallet -->
        <div class="flex justify-center mb-6">
            <button id="connectBtn" class="bg-amber-500 hover:bg-amber-600 text-black font-bold py-3 px-8 rounded-full transition">
                Connect Wallet
            </button>
        </div>

        <!-- Wallet Info -->
        <div id="walletInfo" class="glass-card rounded-2xl p-6 mb-6 hidden">
            <div class="grid md:grid-cols-2 gap-4">
                <div>
                    <p class="text-gray-400 text-sm">Connected Address</p>
                    <p id="address" class="font-mono break-all"></p>
                </div>
                <div>
                    <p class="text-gray-400 text-sm">EOE Balance</p>
                    <p id="balance" class="text-2xl font-bold text-amber-400">0</p>
                </div>
            </div>
        </div>

        <!-- Token Stats -->
        <div class="grid md:grid-cols-3 gap-4 mb-6">
            <div class="glass-card rounded-xl p-4 text-center">
                <p class="text-gray-400 text-sm">Total Supply</p>
                <p id="totalSupply" class="text-xl font-bold">Loading...</p>
            </div>
            <div class="glass-card rounded-xl p-4 text-center">
                <p class="text-gray-400 text-sm">Holders Count</p>
                <p id="holdersCount" class="text-xl font-bold">Loading...</p>
            </div>
            <div class="glass-card rounded-xl p-4 text-center">
                <p class="text-gray-400 text-sm">Your Verified?</p>
                <p id="verifiedStatus" class="text-xl font-bold">-</p>
            </div>
        </div>

        <!-- Holders List -->
        <div class="glass-card rounded-2xl p-6">
            <h2 class="text-xl font-semibold mb-4">🌍 Global Holders</h2>
            <div id="holdersList" class="max-h-60 overflow-y-auto space-y-2">
                <p class="text-gray-500">Connect wallet to load holders...</p>
            </div>
        </div>

        <!-- Footer -->
        <div class="text-center text-gray-500 text-sm mt-8">
            Built for humanity. Live on BSC.
        </div>
    </div>

    <script>
        // Contract address and minimal ABI (only the functions we need)
        const CONTRACT_ADDRESS = "0xe5f245634af5117ae1cb93b579f911fce6ba8b91";
        const ABI = [
            "function name() view returns (string)",
            "function symbol() view returns (string)",
            "function decimals() view returns (uint8)",
            "function totalSupply() view returns (uint256)",
            "function balanceOf(address) view returns (uint256)",
            "function getAllHolders() view returns (address[])",
            "function getHolderCount() view returns (uint256)",
            "function verifiedOwners(address) view returns (bool)"
        ];

        let provider, signer, contract;
        let currentAccount = null;

        // Connect wallet
        document.getElementById('connectBtn').addEventListener('click', async () => {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    // Request account access
                    await window.ethereum.request({ method: 'eth_requestAccounts' });
                    provider = new ethers.BrowserProvider(window.ethereum);
                    signer = await provider.getSigner();
                    currentAccount = await signer.getAddress();
                    
                    // Switch to BSC Mainnet
                    await switchToBSC();
                    
                    // Initialize contract
                    contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, provider);
                    
                    // Update UI
                    document.getElementById('walletInfo').classList.remove('hidden');
                    document.getElementById('address').innerText = currentAccount;
                    
                    // Load data
                    await loadBalances();
                    await loadTokenStats();
                    await loadHolders();
                    
                } catch (error) {
                    console.error(error);
                    alert('Connection failed: ' + error.message);
                }
            } else {
                alert('Please install MetaMask or another Web3 wallet.');
            }
        });

        // Switch to BSC Mainnet
        async function switchToBSC() {
            try {
                await window.ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: '0x38' }], // BSC Mainnet chainId
                });
            } catch (error) {
                // This error code indicates that the chain has not been added to MetaMask
                if (error.code === 4902) {
                    await window.ethereum.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: '0x38',
                            chainName: 'BNB Smart Chain',
                            nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
                            rpcUrls: ['https://bsc-dataseed.binance.org/'],
                            blockExplorerUrls: ['https://bscscan.com/']
                        }]
                    });
                } else {
                    throw error;
                }
            }
        }

        async function loadBalances() {
            if (!contract || !currentAccount) return;
            const balance = await contract.balanceOf(currentAccount);
            const decimals = await contract.decimals();
            document.getElementById('balance').innerText = ethers.formatUnits(balance, decimals);
            
            // Check if verified
            try {
                const verified = await contract.verifiedOwners(currentAccount);
                document.getElementById('verifiedStatus').innerText = verified ? '✅' : '❌';
            } catch {
                document.getElementById('verifiedStatus').innerText = 'N/A';
            }
        }

        async function loadTokenStats() {
            if (!contract) return;
            const totalSupply = await contract.totalSupply();
            const decimals = await contract.decimals();
            document.getElementById('totalSupply').innerText = ethers.formatUnits(totalSupply, decimals) + ' EOE';
            
            // Try to get holder count
            try {
                const count = await contract.getHolderCount();
                document.getElementById('holdersCount').innerText = count.toString();
            } catch {
                document.getElementById('holdersCount').innerText = 'N/A';
            }
        }

        async function loadHolders() {
            if (!contract) return;
            try {
                const holders = await contract.getAllHolders();
                const listDiv = document.getElementById('holdersList');
                listDiv.innerHTML = '';
                
                if (holders.length === 0) {
                    listDiv.innerHTML = '<p class="text-gray-500">No holders found</p>';
                    return;
                }
                
                // Display first 20 holders
                const displayHolders = holders.slice(0, 20);
                for (const addr of displayHolders) {
                    const balance = await contract.balanceOf(addr);
                    const decimals = await contract.decimals();
                    const balFormatted = ethers.formatUnits(balance, decimals);
                    
                    const item = document.createElement('div');
                    item.className = 'flex justify-between items-center p-2 bg-black/30 rounded';
                    item.innerHTML = `
                        <span class="font-mono text-sm">${addr.slice(0,6)}...${addr.slice(-4)}</span>
                        <span class="text-amber-400">${Number(balFormatted).toFixed(2)} EOE</span>
                    `;
                    listDiv.appendChild(item);
                }
                
                if (holders.length > 20) {
                    const more = document.createElement('p');
                    more.className = 'text-gray-500 text-sm mt-2';
                    more.innerText = `... and ${holders.length - 20} more`;
                    listDiv.appendChild(more);
                }
            } catch (error) {
                console.error('Failed to load holders:', error);
                document.getElementById('holdersList').innerHTML = '<p class="text-gray-500">Holders list not available</p>';
            }
        }

        // Auto-refresh data when account changes
        if (window.ethereum) {
            window.ethereum.on('accountsChanged', (accounts) => {
                if (accounts.length > 0) {
                    currentAccount = accounts[0];
                    loadBalances();
                } else {
                    window.location.reload();
                }
            });
            
            window.ethereum.on('chainChanged', () => {
                window.location.reload();
            });
        }
    </script>
</body>
</html>
