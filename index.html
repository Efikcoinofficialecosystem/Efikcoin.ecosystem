<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Efikcoin Official Ecosystem (EOE)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>body{background:#0a0a0a;color:#fff;}</style>
</head>
<body class="p-6">
    <div class="max-w-md mx-auto text-center">
        <h1 class="text-3xl font-bold text-amber-400">EOE</h1>
        <p class="text-gray-400 mb-4">Efikcoin Official Ecosystem</p>
        <p class="text-xs text-gray-500 break-all">0xe5f245634af5117ae1cb93b579f911fce6ba8b91</p>

        <button id="connect" class="bg-amber-500 px-6 py-2 rounded-full mt-4">Connect Wallet</button>

        <div id="info" class="mt-6 hidden">
            <div class="bg-gray-800 p-4 rounded">
                <p class="text-gray-400">Your Balance</p>
                <p id="balance" class="text-2xl font-bold">0 EOE</p>
            </div>
            <div class="bg-gray-800 p-4 rounded mt-2">
                <p class="text-gray-400">Total Supply</p>
                <p id="totalSupply" class="text-xl">Loading...</p>
            </div>
        </div>

        <!-- Error display area -->
        <div id="errorMsg" class="mt-4 p-3 bg-red-900/50 text-red-300 rounded hidden"></div>
    </div>

    <script>
        const CONTRACT_ADDRESS = "0xe5f245634af5117ae1cb93b579f911fce6ba8b91";
        const ABI = [
            "function balanceOf(address) view returns (uint256)",
            "function totalSupply() view returns (uint256)",
            "function decimals() view returns (uint8)"
        ];

        const connectBtn = document.getElementById('connect');
        const infoDiv = document.getElementById('info');
        const balanceSpan = document.getElementById('balance');
        const totalSupplySpan = document.getElementById('totalSupply');
        const errorDiv = document.getElementById('errorMsg');

        function showError(msg) {
            errorDiv.innerText = msg;
            errorDiv.classList.remove('hidden');
            console.error(msg);
        }

        connectBtn.addEventListener('click', async () => {
            errorDiv.classList.add('hidden'); // clear old errors

            if (!window.ethereum) {
                showError("MetaMask not detected. Please install MetaMask.");
                return;
            }

            try {
                // Request accounts
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                if (accounts.length === 0) {
                    showError("No accounts returned. Please unlock MetaMask.");
                    return;
                }

                const provider = new ethers.BrowserProvider(window.ethereum);
                const signer = await provider.getSigner();
                const account = await signer.getAddress();

                // Switch to BSC
                try {
                    await window.ethereum.request({
                        method: 'wallet_switchEthereumChain',
                        params: [{ chainId: '0x38' }]
                    });
                } catch (switchError) {
                    if (switchError.code === 4902) {
                        // Add BSC network
                        await window.ethereum.request({
                            method: 'wallet_addEthereumChain',
                            params: [{
                                chainId: '0x38',
                                chainName: 'BNB Smart Chain',
                                nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
                                rpcUrls: ['https://bsc-dataseed.binance.org/'],
                                blockExplorerUrls: ['https://bscscan.com/']
                            }]
                        });
                    } else {
                        throw switchError;
                    }
                }

                // Now create contract instance
                const contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, provider);

                // Fetch data
                const balance = await contract.balanceOf(account);
                const decimals = await contract.decimals();
                const totalSupply = await contract.totalSupply();

                // Format and display
                balanceSpan.innerText = ethers.formatUnits(balance, decimals) + ' EOE';
                totalSupplySpan.innerText = ethers.formatUnits(totalSupply, decimals) + ' EOE';
                infoDiv.classList.remove('hidden');
            } catch (error) {
                showError(error.message || "An unknown error occurred.");
            }
        });
    </script>
</body>
</html>
