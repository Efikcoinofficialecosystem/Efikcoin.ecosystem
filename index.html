<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efikcoin Eternal | Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .gradient-text { background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <nav class="p-6 flex justify-between items-center max-w-7xl mx-auto">
        <h1 class="text-xl font-bold gradient-text">EFIKCOIN ETERNAL</h1>
        <button id="connectButton" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-full text-sm font-bold transition">
            Connect Wallet
        </button>
    </nav>

    <header class="py-16 text-center px-4">
        <h2 class="text-4xl font-extrabold mb-4">Official <span class="gradient-text">Efikcoin</span> Portal</h2>
        
        <!-- Wallet Info Box -->
        <div id="walletInfo" class="hidden max-w-md mx-auto mt-8 card p-6 rounded-2xl border-blue-500 border">
            <p class="text-gray-400 text-sm">Wallet Connected:</p>
            <p id="userAddress" class="font-mono text-xs text-blue-300 mb-4 truncate"></p>
            
            <div class="bg-slate-800 p-4 rounded-xl">
                <p class="text-xs uppercase text-gray-400">Your EFIK Balance</p>
                <p id="tokenBalance" class="text-3xl font-bold text-white">0.00</p>
                <p class="text-blue-400 font-bold">EFIK</p>
            </div>
        </div>

        <div id="installMessage" class="mt-4 text-orange-400 text-sm hidden">
            Using mobile? Open this site inside the <b>MetaMask App Browser</b>.
        </div>
    </header>

    <section class="max-w-4xl mx-auto px-4 pb-20">
        <div class="card p-6 rounded-2xl mb-6">
            <h3 class="text-sm text-blue-400 font-bold mb-2">CONTRACT ADDRESS (BSC)</h3>
            <p class="text-xs md:text-base font-mono break-all">0x9F8C29E496ECB6C39c221458f211234DfCB233E0</p>
        </div>
    </section>

    <script>
        const contractAddress = "0x9F8C29E496ECB6C39c221458f211234DfCB233E0";
        const tokenAbi = [
            "function balanceOf(address owner) view returns (uint256)",
            "function decimals() view returns (uint8)",
            "function symbol() view returns (string)"
        ];

        const btn = document.getElementById('connectButton');
        const walletInfo = document.getElementById('walletInfo');
        const userAddress = document.getElementById('userAddress');
        const tokenBalance = document.getElementById('tokenBalance');
        const installMsg = document.getElementById('installMessage');

        async function updateBalance(account, provider) {
            try {
                const contract = new ethers.Contract(contractAddress, tokenAbi, provider);
                const balance = await contract.balanceOf(account);
                const decimals = await contract.decimals();
                const formattedBalance = ethers.utils.formatUnits(balance, decimals);
                
                tokenBalance.innerText = parseFloat(formattedBalance).toLocaleString(undefined, {minimumFractionDigits: 2});
            } catch (err) {
                console.error("Error fetching balance:", err);
            }
        }

        async function connect() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    // Request accounts
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const account = accounts[0];
                    
                    // Set up Provider
                    const provider = new ethers.providers.Web3Provider(window.ethereum);
                    
                    // UI Changes
                    btn.innerText = "Connected";
                    btn.classList.replace('bg-blue-600', 'bg-green-600');
                    walletInfo.classList.remove('hidden');
                    userAddress.innerText = account;
                    installMsg.classList.add('hidden');

                    // Get Balance
                    updateBalance(account, provider);

                } catch (error) {
                    console.error("Connection failed", error);
                }
            } else {
                // Show help message for mobile users
                installMsg.classList.remove('hidden');
                alert("Please open this website inside your MetaMask or Trust Wallet App browser.");
            }
        }

        btn.addEventListener('click', connect);
    </script>
</body>
</html>
