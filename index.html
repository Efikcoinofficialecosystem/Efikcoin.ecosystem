<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efikcoin Official Ecosystem (EOE)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: system-ui; }
        .card { background: #1a1a1a; border-radius: 1rem; padding: 1.5rem; border: 1px solid #333; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-2xl mx-auto">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold bg-gradient-to-r from-amber-400 to-orange-500 bg-clip-text text-transparent">
                Efikcoin Official Ecosystem
            </h1>
            <p class="text-gray-400 mt-2">Symbol: <span class="font-mono text-amber-400">EOE</span></p>
            <p class="text-sm text-gray-500 break-all">0xe5f245634af5117ae1cb93b579f911fce6ba8b91</p>
        </div>

        <!-- Public Token Data (No Wallet Needed) -->
        <div class="card mb-6">
            <h2 class="text-xl font-semibold mb-4">📊 Token Statistics (Live from BSC)</h2>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <p class="text-gray-400 text-sm">Total Supply</p>
                    <p id="totalSupply" class="text-2xl font-bold text-amber-400">Loading...</p>
                </div>
                <div>
                    <p class="text-gray-400 text-sm">Holders Count</p>
                    <p id="holdersCount" class="text-2xl font-bold text-amber-400">Loading...</p>
                </div>
                <div class="col-span-2">
                    <p class="text-gray-400 text-sm">Contract Creator</p>
                    <p id="creator" class="font-mono text-sm break-all">Loading...</p>
                </div>
            </div>
        </div>

        <!-- Check Any Address Balance (Manual Entry) -->
        <div class="card mb-6">
            <h2 class="text-xl font-semibold mb-4">🔍 Check Any Address Balance</h2>
            <div class="flex gap-2">
                <input type="text" id="addressInput" placeholder="Enter wallet address (0x...)" class="flex-1 bg-black border border-gray-700 rounded-lg px-4 py-2 text-white">
                <button id="checkBalanceBtn" class="bg-amber-500 hover:bg-amber-600 text-black font-semibold px-6 py-2 rounded-lg">
                    Check
                </button>
            </div>
            <div id="balanceResult" class="mt-4 hidden">
                <p class="text-gray-400">Balance: <span id="addressBalance" class="text-2xl font-bold text-amber-400"></span></p>
            </div>
        </div>

        <!-- Your Personal Balance (if you want quick access) -->
        <div class="card">
            <h2 class="text-xl font-semibold mb-4">👤 Your Balance (Deployer)</h2>
            <p id="deployerBalance" class="text-3xl font-bold text-amber-400">Loading...</p>
        </div>
    </div>

    <script>
        // Contract address and your deployer address (replace with your actual wallet)
        const CONTRACT = "0xe5f245634af5117ae1cb93b579f911fce6ba8b91";
        const DEPLOYER = "0xc5ad5cfcf81ad63a94227334b898eafce6b27cca"; // Your wallet from earlier

        // BscScan API (free, no key needed for basic calls, but limited)
        const BSCSCAN_API = "https://api.bscscan.com/api";

        async function fetchBscScan(module, action, address, contract = CONTRACT) {
            const url = `${BSCSCAN_API}?module=${module}&action=${action}&contractaddress=${contract}&address=${address}&apikey=YourApiKeyToken`; 
            // Note: Free tier works without key for many calls, but may be rate limited. If issues, we'll add a key later.
            try {
                const response = await fetch(url);
                const data = await response.json();
                return data.result;
            } catch (e) {
                console.error(e);
                return null;
            }
        }

        async function loadTokenStats() {
            // Total supply
            const supply = await fetchBscScan('stats', 'tokensupply', CONTRACT);
            if (supply) {
                document.getElementById('totalSupply').innerText = (parseInt(supply) / 1e18).toLocaleString() + ' EOE';
            } else {
                document.getElementById('totalSupply').innerText = 'Unavailable';
            }

            // Holders count (BscScan may not provide this directly, but we can try)
            // Alternative: use a third-party API like Covalent, but for simplicity we'll show placeholder.
            document.getElementById('holdersCount').innerText = 'Check BscScan';

            // Creator address (from contract creation tx)
            const creator = await fetchBscScan('contract', 'getcontractcreation', CONTRACT);
            if (creator && creator[0]) {
                document.getElementById('creator').innerText = creator[0].contractCreator;
            } else {
                document.getElementById('creator').innerText = 'Unknown';
            }

            // Deployer balance
            const deployerBal = await fetchBscScan('account', 'tokenbalance', DEPLOYER, CONTRACT);
            if (deployerBal) {
                document.getElementById('deployerBalance').innerText = (parseInt(deployerBal) / 1e18).toLocaleString() + ' EOE';
            } else {
                document.getElementById('deployerBalance').innerText = 'Unavailable';
            }
        }

        // Check custom address balance
        document.getElementById('checkBalanceBtn').addEventListener('click', async () => {
            const addr = document.getElementById('addressInput').value.trim();
            if (!addr) return;
            const balance = await fetchBscScan('account', 'tokenbalance', addr, CONTRACT);
            const resultDiv = document.getElementById('balanceResult');
            const balanceSpan = document.getElementById('addressBalance');
            if (balance) {
                balanceSpan.innerText = (parseInt(balance) / 1e18).toLocaleString() + ' EOE';
                resultDiv.classList.remove('hidden');
            } else {
                alert('Error fetching balance. Check address or try again.');
            }
        });

        // Initial load
        loadTokenStats();
    </script>
</body>
        </html>
